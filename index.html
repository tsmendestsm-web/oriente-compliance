async function geminiCall(sys, msg, maxTok) {
  if (!IA_PROXY_URL || IA_PROXY_URL.includes("SEU-SUBDOMINIO")) return null;
  try {
    const r = await fetch(IA_PROXY_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        contents: [{
          role: "user",
          parts: [{ text: msg }]
        }],
        systemInstruction: {
          parts: [{ text: sys }]
        },
        generationConfig: {
          maxOutputTokens: maxTok || 1500
        }
      })
    });
    if (r.ok) {
      const d = await r.json();
      const txt = d?.candidates?.[0]?.content?.parts?.[0]?.text || "";
      if (txt) return { ok: true, txt };
      return { ok: false, motivo: "Resposta vazia da IA." };
    }
    if (r.status === 429) {
      return { ok: false, motivo: "Limite gratuito da IA atingido por agora (1500/dia)." };
    }
    if (r.status === 400 || r.status === 401 || r.status === 403) {
      return { ok: false, motivo: "Configuracao da IA invalida (" + r.status + "). Verifique a chave no Worker." };
    }
    return { ok: false, motivo: "Erro HTTP " + r.status + " na IA." };
  } catch (e) {
    return { ok: false, motivo: "Erro de rede na IA: " + (e?.message || "desconhecido") };
  }
}

function diasDesde(dataStr) {
  if (!dataStr) return 0;
  const p = dataStr.split("/");
  if (p.length !== 3) return 0;
  const dt = new Date(parseInt(p[2]), parseInt(p[1]) - 1, parseInt(p[0]));
  return Math.floor((Date.now() - dt.getTime()) / 86400000);
}

function parseCSV(text) {
  const rows = [];
  let row = [],
    f = "",
    inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') {
      if (inQ && text[i + 1] === '"') {
        f += '"';
        i++;
      } else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      row.push(f.trim());
      f = "";
    } else if ((c === '\n' || c === '\r') && !inQ) {
      if (c === '\r' && text[i + 1] === '\n') i++;
      row.push(f.trim());
      f = "";
      if (row.some(x => x)) rows.push(row);
      row = [];
    } else f += c;
  }
  if (f || row.length) {
    row.push(f.trim());
    if (row.some(x => x)) rows.push(row);
  }
  return rows;
}

async function iaCall(sys, msg, maxTok) {
  let ultimoErro = "";

  // 1a tentativa: Gemini (1500 requisicoes/dia gratuitas, sem cartao)
  const gem = await geminiCall(sys, msg, maxTok);
  if (gem && gem.ok) return gem.txt;
  if (gem) ultimoErro = gem.motivo;

  // 2a tentativa: OpenRouter (fallback, 50 requisicoes/dia gratuitas)
  const msgs = [{
    role: "system",
    content: sys
  }, {
    role: "user",
    content: msg
  }];
  let txt = "";
  const modelos = await getModelosFree();
  for (const m of modelos) {
    try {
      const r = await fetch(OR_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + OR_KEY,
          "HTTP-Referer": "https://orientesolucoes.com",
          "X-Title": "Oriente Compliance"
        },
        body: JSON.stringify({
          model: m,
          messages: msgs,
          max_tokens: maxTok || 1500
        })
      });
      if (r.ok) {
        const d = await r.json();
        txt = d?.choices?.[0]?.message?.content || "";
        if (txt) break;
      } else {
        if (r.status === 401) { ultimoErro = "Chave de API invalida ou revogada (401)."; break; }
        else if (r.status === 402) { ultimoErro = "Sem credito disponivel na conta OpenRouter (402)."; break; }
        else if (r.status === 429) {
          const retryAfter = r.headers.get("Retry-After");
          ultimoErro = "Limite de requisicoes gratuitas atingido por agora." + (retryAfter ? " Aguarde " + retryAfter + "s." : " Aguarde alguns minutos.");
          break; // outro modelo tambem vai falhar com 429 na mesma janela — nao desperdica mais requisicoes
        }
        else ultimoErro = "Erro HTTP " + r.status + " no modelo " + m + ".";
      }
    } catch (e) {
      ultimoErro = "Erro de rede: " + (e?.message || "desconhecido");
    }
  }
  if (txt) return txt;
  return "[IA indisponivel — " + (ultimoErro || "todos os modelos gratuitos falharam") + "]";
}
