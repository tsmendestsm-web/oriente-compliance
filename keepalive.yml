name: Supabase Keep-Alive

# Mantém o projeto Supabase ativo, evitando a pausa automática
# que ocorre após 7 dias de inatividade no plano gratuito.

on:
  schedule:
    # Roda a cada 3 dias, às 12:00 UTC (09:00 no horário de Brasília)
    # Margem segura: 3 dias < 7 dias do limite do Supabase
    - cron: '0 12 */3 * *'
  # Permite acionar manualmente pelo painel do GitHub (aba Actions)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (mantém o banco ativo)
        run: |
          echo "Enviando ping para manter o Supabase ativo..."

          RESPONSE=$(curl -s -w "\n%{http_code}" -X PATCH \
            "${{ secrets.SUPABASE_URL }}/rest/v1/keepalive?id=eq.1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d "{\"last_ping\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Status HTTP: $HTTP_CODE"
          echo "Resposta: $BODY"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✓ Ping bem-sucedido — Supabase permanece ativo."
          else
            echo "✗ Falha no ping (HTTP $HTTP_CODE)."
            exit 1
          fi
